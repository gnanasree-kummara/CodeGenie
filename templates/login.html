<!DOCTYPE html>
<html>
<head>
    <title>Login - Code Genie</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
</head>
<body>

<div class="login-container">
    <h1>Code Genie</h1>
    <p>AI Explainer & Code Generator</p>

    <form method="POST" autocomplete="off">

        <!-- Fake fields to stop browser autofill -->
        <input type="text" name="fakeuser" style="display:none">
        <input type="password" name="fakepass" style="display:none">

        <input type="email"
               name="user_email"
               placeholder="Enter your email"
               autocomplete="off"
               required>

        <input type="password"
               name="user_password"
               placeholder="Enter your password"
               autocomplete="new-password"
               required>

        {% if error %}
        <p style="color:red; font-size:14px; text-align:center;">
            {{ error }}
        </p>
        {% endif %}

        <p style="text-align:center;">
            <a href="/signup" style="color:#191032; font-weight:bold;">
                New user? Sign Up
            </a>
        </p>

        <p style="text-align:center; margin-top:10px;">
            <a href="{{ url_for('admin_login') }}" style="font-size:13px; opacity:0.7;">
                Admin Login
            </a>
        </p>

        <button type="submit">Sign In</button>
    </form>
</div>

</body>
</html>
